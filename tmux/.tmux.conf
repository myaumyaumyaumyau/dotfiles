# Extended keys: пропускать Shift+Enter, Ctrl+Enter, Ctrl+/ в nvim
set -g extended-keys on
set -g default-terminal "tmux-256color"
set -as terminal-features ',xterm-256color:RGB,extkeys'

# ============================================================================
#  Префикс
# ============================================================================
# Ремап с дефолтного C-b на более удобный C-a.
# send-prefix позволяет жать C-a C-a чтобы отправить настоящий C-a в шелл
# (полезно для readline-шортката "в начало строки").
unbind C-b
set -g prefix C-a
bind C-a send-prefix


# ============================================================================
#  Базовые настройки
# ============================================================================
# Поведение терминала
set -g mouse on                  # клики, скролл, ресайз границ мышью
set -g history-limit 100000      # больше истории прокрутки в copy-mode
set -g focus-events on           # передает эвент фокуса в nvim

# Скорость / vim-friendly
set -sg escape-time 10           # минимальная задержка после Esc (важно для nvim)
setw -g mode-keys vi             # vim-стайл навигация в copy-mode (v/y/hjkl)

# Нумерация окон и панелей с 1 (на клавиатуре '1' ближе чем '0')
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on       # перенумеровывать окна при закрытии

# ============================================================================
#  Плагины
# ============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-save-interval '10'
set -g @continuum-restore 'on'


# ============================================================================
#  Статусбар
# ============================================================================

set -g status-style "bg=#1e1e2e fg=#cdd6f4"
set -g status-left-length 100
set -g status-right-length 100

# Левая часть — пусто
set -g status-left ""

# Правая часть — зум + время + сессия
set -g status-right "#{?window_zoomed_flag,#[bg=#89dceb fg=#1e1e2e bold] Z ,}#[bg=#313244 fg=#cdd6f4] %H:%M #[bg=#cba6f7 fg=#1e1e2e bold] #S "

# Вкладки окон
set -g window-status-current-style "bg=#89b4fa fg=#1e1e2e bold"
set -g window-status-current-format " #I #W "
set -g window-status-style "bg=#313244 fg=#cdd6f4"
set -g window-status-format " #I #W "

# Разделитель между вкладками
set -g window-status-separator ""

# Бордеры панелей
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"


# ============================================================================
#  Биндинги
# ============================================================================
# Reload конфига по prefix + r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"
bind x kill-pane
bind & kill-window

# Сплиты на | и - (мнемоника: палка = вертикальная линия, тире = горизонтальная).
# Открываются в текущей рабочей директории, а не в $HOME.
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# c - new window with zi; C - new window in current directory
bind c new-window -c "~" \; send-keys 'zi' Enter
bind C new-window -c "#{pane_current_path}"

# sesh
bind "f" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""


# ============================================================================
#  smart-splits.nvim integration
# ============================================================================

# Навигация: Ctrl + hjkl
bind -n C-h if -F "#{@pane-is-vim}" 'send-keys C-h' 'select-pane -L'
bind -n C-j if -F "#{@pane-is-vim}" 'send-keys C-j' 'select-pane -D'
bind -n C-k if -F "#{@pane-is-vim}" 'send-keys C-k' 'select-pane -U'
bind -n C-l if -F "#{@pane-is-vim}" 'send-keys C-l' 'select-pane -R'

# Ресайз: Alt + hjkl
bind -n M-h if -F "#{@pane-is-vim}" 'send-keys M-h' 'resize-pane -L 3'
bind -n M-j if -F "#{@pane-is-vim}" 'send-keys M-j' 'resize-pane -D 3'
bind -n M-k if -F "#{@pane-is-vim}" 'send-keys M-k' 'resize-pane -U 3'
bind -n M-l if -F "#{@pane-is-vim}" 'send-keys M-l' 'resize-pane -R 3'

# Навигация в copy-mode
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R

# Переход на предыдущую панель
bind -n 'C-\' if -F "#{@pane-is-vim}" 'send-keys C-\\' 'select-pane -l'
bind -T copy-mode-vi 'C-\' select-pane -l


run '~/.tmux/plugins/tpm/tpm'
